    - generic [ref=e2456]:
      - img "Поможем подобрать тариф" [ref=e2457]
      - heading "Поможем подобрать тариф" [level=2] [ref=e2458]:
        - text: Поможем
        - text: подобрать тариф
      - paragraph [ref=e2459]: Оставьте заявку — мы покажем, как Хантфлоу улучшит ваш подбор и поможем подобрать тариф
      - button "Заявка на презентацию" [ref=e2460] [cursor=pointer]
    - generic [ref=e2462]:
      - heading "Частые вопросы перед приобретением Хантфлоу" [level=2] [ref=e2463]:
        - text: Частые вопросы перед
        - text: приобретением Хантфлоу
      - generic [ref=e2464]:
        - generic [ref=e2465]:
          - term [ref=e2466] [cursor=pointer]:
            - generic [ref=e2467]: В чем главные преимущества облачного рекрутингового сервиса?
            - img [ref=e2469]
          - definition:
            - generic [ref=e2473]: "Все компании в мире переходят на облачные (SaaS) сервисы. У них много неоспоримых преимуществ: доступность на любом устройстве в любой точке мира, отсутствие затрат на техническую поддержку в штате, постоянные релизы новинок и быстрое исправление ошибок."
        - generic [ref=e2474]:
          - term [ref=e2475] [cursor=pointer]:
            - generic [ref=e2476]: Какой тариф мне подойдет?
            - img [ref=e2478]
          - definition:
            - generic [ref=e2481]:
              - generic [ref=e2482]:
                - paragraph [ref=e2483]: Если вам важно получить все передовые возможности автоматизации для ускорения закрытия вакансий и решения любых задач рекрутимента, то тариф Максимальный — для вас. Это самый полнофункциональный тариф Хантфлоу с большим количеством уникальных функциональных возможностей.
                - paragraph [ref=e2484]: Ключевые инструменты для автоматизации рутины, работы с заказчиками и рекрутинговой аналитики собраны в тарифе Профессиональный.
                - paragraph [ref=e2485]: Премьер — это выделенное направление Хантфлоу по работе с крупными компаниями по индивидуальным процедурам приобретения и сопровождения Хантфлоу и с реализацией индивидуальных IT-решений.
                - paragraph [ref=e2486]: Если вы не можете определиться, оставьте заявку — мы поможем выбрать тариф, который поможет решить задачи рекрутмента вашей компании.
              - button "Оставить заявку" [ref=e2487] [cursor=pointer]
        - generic [ref=e2488]:
          - term [ref=e2489] [cursor=pointer]:
            - generic [ref=e2490]: Вы сможете перенести мою базу резюме при переходе на Хантфлоу?
            - img [ref=e2492]
          - definition:
            - paragraph [ref=e2497]: Да, мы переносим наработанные базы резюме из других рекрутинговых систем или файлов в Хантфлоу. Сроки и стоимость работ зависят от количества резюме и источника, откуда нужно забрать базу.
        - generic [ref=e2498]:
          - term [ref=e2499] [cursor=pointer]:
            - generic [ref=e2500]: Какие методы оплаты возможны?
            - img [ref=e2502]
          - definition:
            - generic [ref=e2506]: Хантфлоу оплачивается ежегодно. Оплата по счету-оферте или двустороннему договору, если сумма большая. Возможна оплата по карте как в интернет-магазине.
        - generic [ref=e2507]:
          - term [ref=e2508] [cursor=pointer]:
            - generic [ref=e2509]: Если у вас выйдет какая-то новинка, она будет мне доступна?
            - img [ref=e2511]
          - definition:
            - generic [ref=e2515]: Конечно! Мы постоянно улучшаем функциональность сервиса и все клиенты получают все новинки Хантфлоу в рамках своего тарифа.
        - generic [ref=e2516]:
          - term [ref=e2517] [cursor=pointer]:
            - generic [ref=e2518]: Можно ли перейти на тариф выше? А увеличить число рекрутеров?
            - img [ref=e2520]
          - definition:
            - generic [ref=e2524]: Да, в любой момент вы можете перейти на более функциональный тариф или увеличить число рабочих мест рекрутера. Вам надо будет просто доплатить разницу в стоимости до конца оплаченного периода доступа.
        - generic [ref=e2525]:
          - term [ref=e2526] [cursor=pointer]:
            - generic [ref=e2527]: Как Хантфлоу обеспечивает безопасность и надежность работы?
            - img [ref=e2529]
          - definition:
            - list [ref=e2534]:
              - listitem [ref=e2535]:
                - text: Мы ежегодно успешно проходим независимый аудит безопасности инфраструктуры и приложения Хантфлоу в крупнейшей международной компании
                - link "Bishop Fox" [ref=e2536] [cursor=pointer]:
                  - /url: https://www.bishopfox.com
                - text: .
              - listitem [ref=e2537]: Все данные хранятся в дата-центре Selectel уровня надежности Tier III.
              - listitem [ref=e2538]: В Хантфлоу настроено непрерывное резервное копирование всех данных клиентов на резервный сервер.
              - listitem [ref=e2539]: В Хантфлоу нет ни одного внешнего скрипта вроде Яндекс.Метрики, Google Analytics, Facebook Pixel, чатов поддержки Carrot Quest, JivoSite, Chatra и других внешних скриптов после входа в личный кабинет. Технически все они имеют доступ к вашим данным, что противоречит приватности персональных данных.
        - generic [ref=e2540]:
          - term [ref=e2541] [cursor=pointer]:
            - generic [ref=e2542]: Как Хантфлоу выполняет 152-ФЗ «О персональных данных»?
            - img [ref=e2544]
          - definition:
            - generic [ref=e2548]: Мы строго следим за выполнением закона 152-ФЗ. Сервера Хантфлоу находятся в России, в дата-центре Selectel, компания входит в реестр операторов персональных данных, а ИТ-инфраструктура защищена аппаратным фаерволлом.
        - generic [ref=e2549]:
          - term [ref=e2550] [cursor=pointer]:
            - generic [ref=e2551]: Что будет с базой, если мы прекратим использовать Хантфлоу?
            - img [ref=e2553]
          - definition:
            - generic [ref=e2557]: Мы по договору обязуемся бесплатно вернуть клиенту базу в универсальном компьютерном формате JSON со всеми вакансиями, резюме, взаимосвязями, комментариями, хронологией и пользователями для переноса в любую другую программу. Или же просто резюме в PDF или DOCX, по вашему усмотрению.
